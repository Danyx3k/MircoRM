spring.application.name=microrm-api
server.port=${API_PORT:8081}

spring.config.import=optional:file:./application-auth0.local.properties

# Auth0 / JWT (resource server). Con enabled=true, /api/** exige Bearer con la misma audience que el SPA.
app.microrm.auth.enabled=${AUTH_ENABLED:false}
app.microrm.auth.issuer-uri=${AUTH0_ISSUER_URI:}
app.microrm.auth.audience=${AUTH0_AUDIENCE:}
app.microrm.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}

# Config local Auth0 (opcional). AUTH_ENABLED=false por defecto en application-auth0.local.properties
spring.config.import=optional:file:./application-auth0.local.properties

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:microrm}
spring.datasource.username=${DB_USER:microrm}
spring.datasource.password=${DB_PASSWORD:microrm_dev}

spring.jpa.hibernate.ddl-auto=validate
# Flyway debe migrar antes de que Hibernate valide el esquema
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
# Esquema donde están las tablas (no usar public si el hospital usa microlab)
spring.jpa.properties.hibernate.default_schema=microlab

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=microlab
spring.flyway.default-schema=microlab
# Ver en consola si Flyway ejecuta V1…V5 antes del arranque de JPA
logging.level.org.flyway.core=INFO

# OpenAPI / Swagger UI (springdoc)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.show-actuator=false

# Día civil para reinicio del consecutivo de número de laboratorio (medianoche en esta zona)
app.microrm.business-timezone=America/Bogota

# Auth0 / JWT (resource server). Con enabled=true, /api/** exige Bearer con la misma audience que el SPA.
# Issuer: https://{tu-tenant}.auth0.com/  |  Audience: API Identifier creado en Auth0 → APIs
app.microrm.auth.enabled=${AUTH_ENABLED:false}
app.microrm.auth.issuer-uri=${AUTH0_ISSUER_URI:}
app.microrm.auth.audience=${AUTH0_AUDIENCE:}
app.microrm.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}

# Kafka / CDC (Debezium). En Docker: KAFKA_BOOTSTRAP_SERVERS=kafka:9092
app.microrm.kafka.enabled=${KAFKA_ENABLED:false}
app.microrm.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
app.microrm.kafka.domain-events-topic=microrm.domain.events
app.microrm.kafka.cdc-topic-prefix=microrm.microlab
app.microrm.kafka.cdc-topic-paciente=microrm.microlab.paciente
app.microrm.kafka.cdc-topic-muestra=microrm.microlab.muestra
app.microrm.kafka.cdc-topic-muestra-paciente=microrm.microlab.muestra_paciente
app.microrm.kafka.consumer-group=microrm-api
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Redis (conexión; en Docker: REDIS_HOST=redis, REDIS_ENABLED=true)
app.microrm.cache.enabled=${REDIS_ENABLED:false}
app.microrm.cache.host=${REDIS_HOST:localhost}
app.microrm.cache.port=${REDIS_PORT:6379}
app.microrm.cache.password=${REDIS_PASSWORD:}
management.health.redis.enabled=${REDIS_ENABLED:false}
