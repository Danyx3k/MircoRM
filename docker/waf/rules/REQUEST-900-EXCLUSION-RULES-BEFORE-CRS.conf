# MicroRM — exclusiones locales (antes del OWASP CRS)
# Ajuste falsos positivos del API REST + Auth0 sin desactivar el WAF por completo.

# Actuator / salud
SecRule REQUEST_URI "@streq /actuator/health" \
    "id:19000,phase:1,pass,nolog,ctl:ruleEngine=Off"

SecRule REQUEST_URI "@beginsWith /actuator/health/" \
    "id:19001,phase:1,pass,nolog,ctl:ruleEngine=Off"

# OpenAPI / Swagger (desarrollo y pruebas detrás del WAF)
SecRule REQUEST_URI "@rx ^/(swagger-ui|v3/api-docs)" \
    "id:19002,phase:1,pass,nolog,ctl:ruleEngine=Off"

# Tokens JWT en Authorization (evita bloqueos por reglas de cabeceras)
SecRule REQUEST_HEADERS:Authorization "@rx (?i)^Bearer\s+\S+" \
    "id:19010,phase:1,pass,nolog,ctl:ruleRemoveById=920450,ctl:ruleRemoveById=920451"

# API JSON: reglas que suelen dispararse en cuerpos UUID / texto clínico
SecRule REQUEST_URI "@beginsWith /api/v1/" \
    "id:19020,phase:1,pass,nolog,ctl:ruleRemoveById=942100,ctl:ruleRemoveById=942200,ctl:ruleRemoveById=941100"
