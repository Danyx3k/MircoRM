# MicroRM — PostgreSQL + API + Gateway + WAF (ModSecurity CRS)

# Uso: copia env.example a .env, luego desde esta carpeta: docker compose up -d --build



services:

  postgres:

    image: postgres:17-alpine

    container_name: microrm-postgres

    restart: unless-stopped

    environment:

      POSTGRES_DB: ${POSTGRES_DB:-microrm}

      POSTGRES_USER: ${POSTGRES_USER:-microrm}

      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-microrm_dev}

    ports:

      - "${POSTGRES_PORT:-5432}:5432"

    volumes:

      - microrm_pgdata:/var/lib/postgresql/data

    healthcheck:

      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]

      interval: 5s

      timeout: 5s

      retries: 10

      start_period: 10s



  microrm-api:

    build:

      context: ..

      dockerfile: docker/Dockerfile

      args:

        MODULE: microrm-api

        APP_PORT: 8081

    image: microrm-api:local

    container_name: microrm-api

    restart: unless-stopped

    depends_on:

      postgres:

        condition: service_healthy

    environment:

      API_PORT: 8081

      DB_HOST: postgres

      DB_PORT: 5432

      DB_NAME: ${POSTGRES_DB:-microrm}

      DB_USER: ${POSTGRES_USER:-microrm}

      DB_PASSWORD: ${POSTGRES_PASSWORD:-microrm_dev}

      AUTH_ENABLED: ${AUTH_ENABLED:-true}

      AUTH0_ISSUER_URI: ${AUTH0_ISSUER_URI:-https://dev-8b6v5b1m5lue1prr.us.auth0.com/}

      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:-https://microrm-api/}

      CORS_ALLOWED_ORIGIN_PATTERNS: ${CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:*,http://127.0.0.1:*}

    ports:

      - "${API_PORT:-8081}:8081"

    healthcheck:

      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8081/actuator/health | grep -q '\"status\":\"UP\"'"]

      interval: 15s

      timeout: 5s

      retries: 8

      start_period: 90s



  microrm-gateway:

    build:

      context: ..

      dockerfile: docker/Dockerfile

      args:

        MODULE: microrm-gateway

        APP_PORT: 8080

    image: microrm-gateway:local

    container_name: microrm-gateway

    restart: unless-stopped

    depends_on:

      microrm-api:

        condition: service_healthy

    environment:

      GATEWAY_PORT: 8080

      MICRORM_API_URI: http://microrm-api:8081

    expose:

      - "8080"

    healthcheck:

      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health | grep -q '\"status\":\"UP\"'"]

      interval: 15s

      timeout: 5s

      retries: 8

      start_period: 45s



  microrm-waf:

    image: owasp/modsecurity-crs:nginx-alpine

    container_name: microrm-waf

    restart: unless-stopped

    depends_on:

      microrm-gateway:

        condition: service_healthy

    environment:

      SERVERNAME: localhost

      BACKEND: http://microrm-gateway:8080

      PORT: "8080"

      MODSEC_RULE_ENGINE: ${MODSEC_RULE_ENGINE:-On}

      BLOCKING_PARANOIA: ${MODSEC_BLOCKING_PARANOIA:-1}

      PARANOIA: 1

      ANOMALY_INBOUND: ${MODSEC_ANOMALY_INBOUND:-10}

      ANOMALY_OUTBOUND: 4

      REPORTING_LEVEL: 2

      ALLOWED_METHODS: "GET HEAD POST PUT PATCH DELETE OPTIONS"

      ALLOWED_REQUEST_CONTENT_TYPE: "|application/json| |application/x-www-form-urlencoded| |multipart/form-data| |text/plain|"

      SET_REAL_IP_FROM: "0.0.0.0/0"

      REAL_IP_HEADER: X-Forwarded-For

      REAL_IP_RECURSIVE: "On"

    ports:

      - "${WAF_PORT:-8080}:8080"

    volumes:

      - ./waf/rules/REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf:/etc/modsecurity.d/owasp-crs/rules/REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf:ro

      - ./waf/rules/RESPONSE-999-EXCLUSION-RULES-AFTER-CRS.conf:/etc/modsecurity.d/owasp-crs/rules/RESPONSE-999-EXCLUSION-RULES-AFTER-CRS.conf:ro

    healthcheck:

      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/healthz || exit 1"]

      interval: 15s

      timeout: 5s

      retries: 8

      start_period: 30s



volumes:

  microrm_pgdata:

    name: microrm_pgdata

