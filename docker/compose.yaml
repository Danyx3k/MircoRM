# MicroRM — PostgreSQL + API + Gateway + WAF (ModSecurity CRS)

# Uso: copia env.example a .env, luego desde esta carpeta: docker compose up -d --build



services:

  postgres:

    image: postgres:17-alpine

    container_name: microrm-postgres

    restart: unless-stopped

    environment:

      POSTGRES_DB: ${POSTGRES_DB:-microrm}

      POSTGRES_USER: ${POSTGRES_USER:-microrm}

      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-microrm_dev}

    ports:

      - "${POSTGRES_PORT:-5432}:5432"

    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=4
      - -c
      - max_wal_senders=4
    volumes:

      - microrm_pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro

    healthcheck:

      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]

      interval: 5s

      timeout: 5s

      retries: 10

      start_period: 10s



  redis:
    image: redis:7-alpine
    container_name: microrm-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  microrm-api:

    build:

      context: ..

      dockerfile: docker/Dockerfile

      args:

        MODULE: microrm-api

        APP_PORT: 8081

    image: microrm-api:local

    container_name: microrm-api

    restart: unless-stopped

    depends_on:

      postgres:

        condition: service_healthy

      kafka:

        condition: service_healthy

      redis:

        condition: service_healthy

    environment:

      API_PORT: 8081

      DB_HOST: postgres

      DB_PORT: 5432

      DB_NAME: ${POSTGRES_DB:-microrm}

      DB_USER: ${POSTGRES_USER:-microrm}

      DB_PASSWORD: ${POSTGRES_PASSWORD:-microrm_dev}

      AUTH_ENABLED: ${AUTH_ENABLED:-true}

      AUTH0_ISSUER_URI: ${AUTH0_ISSUER_URI:-https://dev-8b6v5b1m5lue1prr.us.auth0.com/}

      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:-https://microrm-api/}

      CORS_ALLOWED_ORIGIN_PATTERNS: ${CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:*,http://127.0.0.1:*}

      KAFKA_ENABLED: ${KAFKA_ENABLED:-true}

      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}

      REDIS_ENABLED: ${REDIS_ENABLED:-true}

      REDIS_HOST: ${REDIS_HOST:-redis}

      REDIS_PORT: ${REDIS_PORT:-6379}

      REDIS_PASSWORD: ${REDIS_PASSWORD:-}

      REDIS_CACHE_TTL_SECONDS: ${REDIS_CACHE_TTL_SECCONDS:-3600}

    ports:

      - "${API_PORT:-8081}:8081"

    healthcheck:

      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8081/actuator/health | grep -q '\"status\":\"UP\"'"]

      interval: 15s

      timeout: 5s

      retries: 8

      start_period: 90s



  kafka:
    image: apache/kafka:3.9.1
    container_name: microrm-kafka
    restart: unless-stopped
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  debezium-connect:
    image: quay.io/debezium/connect:3.0
    container_name: microrm-debezium-connect
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "${DEBEZIUM_PORT:-8083}:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: microrm-connect
      CONFIG_STORAGE_TOPIC: microrm_connect_configs
      OFFSET_STORAGE_TOPIC: microrm_connect_offsets
      STATUS_STORAGE_TOPIC: microrm_connect_status
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1

  debezium-setup:
    image: curlimages/curl:8.11.1
    container_name: microrm-debezium-setup
    restart: "no"
    depends_on:
      debezium-connect:
        condition: service_started
    volumes:
      - ./kafka/debezium-connector.json:/connector/debezium-connector.json:ro
      - ./kafka/register-debezium-connector.sh:/connector/register-debezium-connector.sh:ro
    environment:
      DEBEZIUM_CONNECT_URL: http://debezium-connect:8083
      DEBEZIUM_CONNECTOR_NAME: microrm-postgres
      DEBEZIUM_CONFIG_FILE: /connector/debezium-connector.json
    entrypoint: ["/bin/sh", "/connector/register-debezium-connector.sh"]



  microrm-gateway:

    build:

      context: ..

      dockerfile: docker/Dockerfile

      args:

        MODULE: microrm-gateway

        APP_PORT: 8080

    image: microrm-gateway:local

    container_name: microrm-gateway

    restart: unless-stopped

    depends_on:

      microrm-api:

        condition: service_healthy

    environment:

      GATEWAY_PORT: 8080

      MICRORM_API_URI: http://microrm-api:8081

    expose:

      - "8080"

    healthcheck:

      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health | grep -q '\"status\":\"UP\"'"]

      interval: 15s

      timeout: 5s

      retries: 8

      start_period: 45s



  microrm-waf:

    image: owasp/modsecurity-crs:nginx-alpine

    container_name: microrm-waf

    restart: unless-stopped

    depends_on:

      microrm-gateway:

        condition: service_healthy

      microrm-api:

        condition: service_healthy

    environment:

      SERVERNAME: localhost

      BACKEND: http://microrm-gateway:8080

      RESOLVERS: "127.0.0.11"

      RESOLVER_CONFIG: "valid=10s ipv6=off"

      PROXY_PRESERVE_HOST: "on"

      PORT: "8080"

      MODSEC_RULE_ENGINE: ${MODSEC_RULE_ENGINE:-On}

      BLOCKING_PARANOIA: ${MODSEC_BLOCKING_PARANOIA:-1}

      PARANOIA: 1

      ANOMALY_INBOUND: ${MODSEC_ANOMALY_INBOUND:-10}

      ANOMALY_OUTBOUND: 4

      REPORTING_LEVEL: 2

      ALLOWED_METHODS: "GET HEAD POST PUT PATCH DELETE OPTIONS"

      ALLOWED_REQUEST_CONTENT_TYPE: "|application/json| |application/x-www-form-urlencoded| |multipart/form-data| |text/plain|"

      SET_REAL_IP_FROM: "0.0.0.0/0"

      REAL_IP_HEADER: X-Forwarded-For

      REAL_IP_RECURSIVE: "On"

    ports:

      - "${WAF_PORT:-8080}:8080"

    volumes:

      - ./waf/rules/REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf:/etc/modsecurity.d/owasp-crs/rules/REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf:ro

      - ./waf/rules/RESPONSE-999-EXCLUSION-RULES-AFTER-CRS.conf:/etc/modsecurity.d/owasp-crs/rules/RESPONSE-999-EXCLUSION-RULES-AFTER-CRS.conf:ro

    healthcheck:

      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/healthz || exit 1"]

      interval: 15s

      timeout: 5s

      retries: 8

      start_period: 30s



volumes:

  microrm_pgdata:

    name: microrm_pgdata

