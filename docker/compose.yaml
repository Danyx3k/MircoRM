# PostgreSQL para desarrollo local (MicroRM)
# Uso: copia env.example a .env, luego desde esta carpeta: docker compose up -d

services:
  postgres:
    image: postgres:17-alpine
    container_name: microrm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-microrm}
      POSTGRES_USER: ${POSTGRES_USER:-microrm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-microrm_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - microrm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  microrm_pgdata:
    name: microrm_pgdata
