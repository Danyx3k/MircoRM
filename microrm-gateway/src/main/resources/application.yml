server:
  port: ${GATEWAY_PORT:8080}

spring:
  application:
    name: microrm-gateway
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOriginPatterns:
                  - "http://localhost:*"
                  - "http://127.0.0.1:*"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: true
          routes:
            - id: microrm-api
              uri: ${MICRORM_API_URI:http://localhost:8081}
              predicates:
                - Path=/api/**,/actuator/**
            - id: microrm-openapi
              uri: ${MICRORM_API_URI:http://localhost:8081}
              predicates:
                - Path=/v3/api-docs/**,/swagger-ui/**,/swagger-ui.html
            - id: microrm-via-prefix
              uri: ${MICRORM_API_URI:http://localhost:8081}
              predicates:
                - Path=/micro-rm/**
              filters:
                - RewritePath=/micro-rm/(?<segment>.*), /${segment}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      access: read_only

logging:
  level:
    org.springframework.cloud.gateway: INFO
